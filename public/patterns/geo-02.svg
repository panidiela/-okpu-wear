<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Motif adinkra simplifié — cercles concentriques et triangles -->
  <rect width="80" height="80" fill="none"/>
  <!-- Cercle extérieur -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="#0B0B0B" stroke-width="0.6"/>
  <!-- Cercle intérieur -->
  <circle cx="40" cy="40" r="16" fill="none" stroke="#0B0B0B" stroke-width="0.4"/>
  <!-- Cercle centre -->
  <circle cx="40" cy="40" r="3"  fill="none" stroke="#0B0B0B" stroke-width="0.5"/>
  <!-- 8 rayons -->
  <line x1="40" y1="12" x2="40" y2="24" stroke="#0B0B0B" stroke-width="0.5"/>
  <line x1="40" y1="56" x2="40" y2="68" stroke="#0B0B0B" stroke-width="0.5"/>
  <line x1="12" y1="40" x2="24" y2="40" stroke="#0B0B0B" stroke-width="0.5"/>
  <line x1="56" y1="40" x2="68" y2="40" stroke="#0B0B0B" stroke-width="0.5"/>
  <line x1="20" y1="20" x2="29" y2="29" stroke="#0B0B0B" stroke-width="0.4"/>
  <line x1="51" y1="51" x2="60" y2="60" stroke="#0B0B0B" stroke-width="0.4"/>
  <line x1="60" y1="20" x2="51" y2="29" stroke="#0B0B0B" stroke-width="0.4"/>
  <line x1="29" y1="51" x2="20" y2="60" stroke="#0B0B0B" stroke-width="0.4"/>
</svg>
